# Gas Town — domain-specific coding workflow pack.
#
# Gastown roles: mayor (coordinator), deacon (patrol), boot (watchdog),
# plus rig-scoped agents (witness, refinery, polecat).
# Dog (utility pool) is defined here with tmux theming; maintenance provides
# the fallback (unthemed) dog. Mechanical housekeeping lives in maintenance.
#
# Referenced by both workspace.pack and rigs[].pack:
#   workspace.pack → expands city-scoped agents only (mayor, deacon, boot)
#   rigs[].pack    → expands rig agents only (witness, refinery, polecat)
#
# Crew members are individually named and declared inline in city.toml.

[pack]
name = "gastown"
schema = 1
includes = ["../maintenance", "../../../bd"]

[[doctor]]
name = "check-scripts"
script = "doctor/check-scripts.sh"
description = "Verify pack scripts are executable"

[[commands]]
name = "status"
description = "Show gastown orchestration overview"
long_description = "commands/status-help.txt"
script = "commands/status.sh"

[formulas]
dir = "formulas"

# ── MAYOR — Global coordinator. One per city. ──────────────────────────
[[agent]]
name = "mayor"
scope = "city"
prompt_template = "prompts/mayor.md.tmpl"
nudge = "Check mail and hook status, then act accordingly."
overlay_dir = "overlays/default"
idle_timeout = "1h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]

# ── DEACON — Daemon beacon / patrol executor. One per city. ────────────
[[agent]]
name = "deacon"
scope = "city"
prompt_template = "prompts/deacon.md.tmpl"
nudge = "Run 'gc prime' to check patrol status and begin heartbeat cycle."
overlay_dir = "overlays/default"
idle_timeout = "1h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]

# ── BOOT — Deacon watchdog. Ephemeral. ─────────────────────────────────
[[agent]]
name = "boot"
scope = "city"
prompt_template = "prompts/boot.md.tmpl"
overlay_dir = "overlays/default"

# ── WITNESS — per-rig worker monitor. Singleton. ──────────────────────
[[agent]]
name = "witness"
scope = "rig"
prompt_template = "prompts/witness.md.tmpl"
nudge = "Run 'gc prime' to check worker status and begin patrol cycle."
overlay_dir = "overlays/witness"
idle_timeout = "1h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]

# ── REFINERY — merge queue processor. Singleton. Worktree. ─────────────
[[agent]]
name = "refinery"
scope = "rig"
prompt_template = "prompts/refinery.md.tmpl"
nudge = "Run 'gc prime' to check merge queue and begin processing."
overlay_dir = "overlays/default"
pre_start = ["{{.ConfigDir}}/scripts/worktree-setup.sh {{.WorkDir}} {{.Agent}} {{.CityRoot}} --sync"]
idle_timeout = "2h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]

# ── POLECAT — transient workers. Pool. Worktree. ──────────────────────
[[agent]]
name = "polecat"
scope = "rig"
prompt_template = "prompts/polecat.md.tmpl"
nudge = "Check your hook for work assignments."
overlay_dir = "overlays/default"
pre_start = ["{{.ConfigDir}}/scripts/worktree-setup.sh {{.WorkDir}} {{.Agent}} {{.CityRoot}} --sync"]
idle_timeout = "2h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]
[agent.pool]
min = 0
max = 5

# ── DOG — Infrastructure utility workers. Pool. Themed. ────────────────
# Overrides maintenance's fallback dog with tmux theme and keybindings.
# Prompt and overlay come from the maintenance pack (shared behavior).
[[agent]]
name = "dog"
scope = "city"
prompt_template = "../maintenance/prompts/dog.md.tmpl"
nudge = "Check your hook for work assignments."
overlay_dir = "../maintenance/overlays/default"
idle_timeout = "2h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]
[agent.pool]
min = 0
max = 3
